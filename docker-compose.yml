version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lifecraft
      POSTGRES_USER: lifecraft
      POSTGRES_PASSWORD: lifecraft_secret
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifecraft"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: lifecraft
      DB_USER: lifecraft
      DB_PASSWORD: lifecraft_secret
      SESSION_SECRET: minecraft_lifecraft_secret_2026
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
